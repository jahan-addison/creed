name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-linux:
    name: ${{ matrix.platform.name }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: { name: "x86_64 Linux", os: ubuntu-latest, arch: x86_64 }
            compiler: g++
            cxx: g++
          - platform: { name: "x86_64 Linux", os: ubuntu-latest, arch: x86_64 }
            compiler: clang++
            cxx: clang++
          - platform: { name: "ARM64 Linux", os: ubuntu-24.04-arm, arch: arm64 }
            compiler: g++
            cxx: g++
          - platform: { name: "ARM64 Linux", os: ubuntu-24.04-arm, arch: arm64 }
            compiler: clang++
            cxx: clang++

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.x.x'

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install extras
        if: matrix.compiler == 'g++'
        run: |
          sudo apt-get install -y valgrind

      - name: configure build
        run: |
          SANDFLAGS=""
          if [[ "${{ matrix.compiler }}" == "clang++" ]]; then
            SANDFLAGS="-DUSE_SANITIZER=Address;Undefined"
          fi
          cmake -Bbuild -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DIWYU=OFF -DCMAKE_BUILD_TYPE=Debug $SANDFLAGS -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: build
        run: cmake --build build -j$(nproc)

      - name: test
        run: |
          ./build/test_suite

      - name: memcheck
        if: matrix.compiler == 'g++'
        run: |
          valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 ./build/test_suite

  build-macos:
    name: ${{ matrix.platform.name }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          # - platform: { name: "x86_64 macOS", os: macos-26-intel, arch: x86_64 }
          #   compiler: clang++
          #   cxx: clang++
          - platform: { name: "ARM64 macOS", os: macos-latest, arch: arm64 }
            compiler: clang++
            cxx: clang++

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.x.x'

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install extras
        if: matrix.platform.name == 'x86_64 macOS'
        run: |
          brew install llvm@20 lcov
          export PATH="/opt/homebrew/opt/llvm@20/bin:/opt/homebrew/bin:/opt/homebrew/opt/llvm/bin:$HOME/.local/bin:$PATH"

          llvm-cov --version
          llvm-profdata --version

      - name: configure build
        run: |
          COVERAGE=""
          if [[ "${{ matrix.platform.name }}" == "x86_64 macOS" ]]; then
            COVERAGE="-DENABLE_TEST_COVERAGE=ON"
            export CMAKE_PREFIX_PATH="/opt/homebrew/opt/llvm@20"
          fi
          cmake -Bbuild -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DIWYU=OFF -DCMAKE_BUILD_TYPE=Debug "-DUSE_SANITIZER=Address;Undefined" $COVERAGE -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: build
        run: cmake --build build -j2

      - name: test
        run: |
          ./build/test_suite

      # Coverage analysis:

